<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Neue', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f8e0b0 0%, #f5d7a3 30%, #f2cf96 70%, #f8e0b0 100%);
            color: #5a3921;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
            position: relative;
        }
        
        .gingerbread-house-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(63deg, rgba(160, 82, 45, 0.1) 25%, transparent 25%),
                linear-gradient(117deg, rgba(160, 82, 45, 0.1) 25%, transparent 25%),
                linear-gradient(63deg, transparent 75%, rgba(160, 82, 45, 0.1) 75%),
                linear-gradient(117deg, transparent 75%, rgba(160, 82, 45, 0.1) 75%),
                radial-gradient(circle at 15% 25%, rgba(220, 20, 60, 0.15) 8px, transparent 8px),
                radial-gradient(circle at 85% 75%, rgba(34, 139, 34, 0.15) 8px, transparent 8px),
                radial-gradient(circle at 25% 85%, rgba(255, 215, 0, 0.15) 6px, transparent 6px),
                radial-gradient(circle at 75% 15%, rgba(138, 43, 226, 0.15) 6px, transparent 6px),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.2) 2px, transparent 2px),
                radial-gradient(circle at 20% 40%, rgba(255, 255, 255, 0.2) 3px, transparent 3px),
                radial-gradient(circle at 80% 60%, rgba(255, 255, 255, 0.2) 3px, transparent 3px),
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23a0522d' fill-opacity='0.1'%3E%3Cpath d='M50 20l10 30 30-10-10 30 30 10-30 10 10 30-30-10-10 30-10-30-30 10 10-30-30-10 30-10-10-30 30 10z'/%3E%3C/g%3E%3C/svg%3E");
            background-size: 
                60px 60px,
                60px 60px,
                60px 60px,
                60px 60px,
                200px 200px,
                180px 180px,
                170px 170px,
                160px 160px,
                120px 120px,
                100px 100px,
                100px 100px,
                100px 100px;
            z-index: -2;
            pointer-events: none;
            opacity: 0.6;
        }
        
        .sugar-dust {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.3) 0%, transparent 50%),
                       radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.2) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 40px 0 30px;
            position: relative;
            margin-bottom: 50px;
            background: linear-gradient(145deg, #d2691e, #a0522d);
            border-radius: 20px 20px 0 0;
            box-shadow: 0 15px 35px rgba(139, 69, 19, 0.4);
            border-bottom: 8px solid #8b4513;
            position: relative;
            overflow: hidden;
        }
        
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 15px;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 20px,
                #ffd700 20px,
                #ffd700 40px
            );
            z-index: 1;
        }
        
        .header-title {
            font-size: 3.2rem;
            color: #fff;
            text-shadow: 
                3px 3px 0 #8b4513,
                5px 5px 0 rgba(0, 0, 0, 0.2);
            margin-bottom: 15px;
            letter-spacing: 1.5px;
            font-weight: 800;
            position: relative;
            z-index: 2;
        }
        
        .header-subtitle {
            font-size: 1.5rem;
            color: #ffd700;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #8b4513;
            font-weight: 600;
            position: relative;
            z-index: 2;
        }
        
        .header-decoration {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            z-index: 2;
        }
        
        .gingerbread-window {
            width: 60px;
            height: 60px;
            background: #8b4513;
            border: 4px solid #ffd700;
            border-radius: 15px;
            position: relative;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .gingerbread-window::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
            background: linear-gradient(145deg, #ffd700, #ffa500);
            border-radius: 8px;
        }
        
        .gingerbread-window::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 4px;
            background: #8b4513;
            transform: translateY(-50%);
        }
        
        .main-content-wrapper {
            display: flex;
            gap: 40px;
            margin-bottom: 50px;
            align-items: flex-start;
        }
        
        .main-text {
            flex: 0 0 60%;
            background: linear-gradient(145deg, #fffaf0, #f5f0e6);
            border-radius: 0 0 25px 25px;
            padding: 50px 40px;
            border: 6px solid #a0522d;
            border-top: none;
            box-shadow: 
                0 20px 40px rgba(139, 69, 19, 0.3),
                inset 0 0 30px rgba(255, 215, 0, 0.1);
            position: relative;
            color: #5a3921;
        }
        
        .main-text::before {
            content: '';
            position: absolute;
            top: -6px;
            left: 20px;
            right: 20px;
            height: 12px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
            border-radius: 6px;
        }
        
        .main-image {
            flex: 0 0 40%;
            border-radius: 25px;
            overflow: hidden;
            border: 6px solid #a0522d;
            box-shadow: 
                0 20px 40px rgba(139, 69, 19, 0.3),
                inset 0 0 30px rgba(255, 215, 0, 0.1);
            position: relative;
            height: 600px;
        }
        
        .main-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: sepia(0.2) brightness(1.05);
            transition: transform 0.5s ease;
        }
        
        .main-image:hover img {
            transform: scale(1.05);
        }
        
        .main-image-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(139, 69, 19, 0.9), transparent);
            color: #ffd700;
            padding: 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
        
        .main-title {
            font-size: 2.5rem;
            color: #8b4513;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 
                2px 2px 0 #ffd700,
                -1px -1px 0 #ffd700;
            padding-bottom: 15px;
            border-bottom: 3px dotted #d2691e;
            font-weight: 700;
        }
        
        .main-content {
            font-size: 1.3rem;
            line-height: 1.8;
            margin: 30px 0;
            padding: 30px;
            background: rgba(255, 248, 220, 0.8);
            border-radius: 15px;
            border-left: 8px solid #d2691e;
            color: #5a3921;
            box-shadow: inset 0 2px 10px rgba(139, 69, 19, 0.1);
        }
        
        .main-content p {
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .main-content p:last-child {
            margin-bottom: 0;
        }
        
        /* Вертикальный список месяцев */
        .months-sidebar {
            flex: 0 0 280px;
            background: linear-gradient(145deg, #fffaf0, #f5f0e6);
            border-radius: 25px;
            padding: 30px 20px;
            border: 6px solid #a0522d;
            box-shadow: 
                0 20px 40px rgba(139, 69, 19, 0.3),
                inset 0 0 30px rgba(255, 215, 0, 0.1);
            position: sticky;
            top: 20px;
            align-self: flex-start;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }
        
        .months-sidebar::-webkit-scrollbar {
            width: 10px;
        }
        
        .months-sidebar::-webkit-scrollbar-track {
            background: #f5f0e6;
            border-radius: 10px;
        }
        
        .months-sidebar::-webkit-scrollbar-thumb {
            background: #a0522d;
            border-radius: 10px;
            border: 2px solid #ffd700;
        }
        
        .sidebar-title {
            font-size: 2rem;
            color: #8b4513;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(255, 215, 0, 0.3);
            padding-bottom: 15px;
            border-bottom: 3px dotted #d2691e;
            font-weight: 700;
        }
        
        .months-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .month-item {
            background: linear-gradient(145deg, #fff8e7, #fff0d4);
            border-radius: 15px;
            padding: 15px;
            border: 3px solid #d2691e;
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .month-item:hover {
            transform: translateX(10px);
            border-color: #ffd700;
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.3);
        }
        
        .month-item.active {
            background: linear-gradient(145deg, #f5e6d3, #f0dbc0);
            border-color: #ffd700;
            border-width: 4px;
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.4);
            transform: scale(1.02);
        }
        
        .month-number {
            width: 45px;
            height: 45px;
            background: #8b4513;
            color: #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.3rem;
            border: 3px solid #ffd700;
            flex-shrink: 0;
            transition: all 0.3s;
        }
        
        .month-item.active .month-number {
            transform: scale(1.1);
            background: #a0522d;
        }
        
        .month-info {
            flex: 1;
        }
        
        .month-title {
            font-size: 1.3rem;
            color: #8b4513;
            font-weight: 700;
            margin-bottom: 3px;
        }
        
        .month-subtitle {
            font-size: 0.9rem;
            color: #a0522d;
            opacity: 0.8;
        }
        
        .month-icon {
            font-size: 1.3rem;
            color: #ffa500;
            margin-left: auto;
            padding-left: 10px;
        }
        
        /* Основной контент с адаптацией под список месяцев */
        .content-with-sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        
        .carousel-section {
            display: none; /* Скрываем старую карусель */
        }
        
        .page-content {
            background: linear-gradient(145deg, #fffaf0, #f5f0e6);
            border-radius: 25px;
            padding: 50px 40px;
            margin: 40px 0;
            border: 6px solid #a0522d;
            box-shadow: 
                0 20px 40px rgba(139, 69, 19, 0.3),
                inset 0 0 30px rgba(255, 215, 0, 0.1);
            position: relative;
            color: #5a3921;
            display: none;
        }
        
        .page-content.active {
            display: block;
            animation: pageAppear 0.5s ease-out;
        }
        
        @keyframes pageAppear {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        .page-title {
            font-size: 2.5rem;
            color: #8b4513;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 
                2px 2px 0 #ffd700,
                -1px -1px 0 #ffd700;
            padding-bottom: 15px;
            border-bottom: 3px dotted #d2691e;
            font-weight: 700;
        }
        
        .page-images {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin: 30px 0;
        }
        
        .page-image {
            flex: 1;
            min-width: 300px;
            max-width: 450px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 
                0 15px 30px rgba(139, 69, 19, 0.3),
                0 0 0 3px #d2691e;
            transition: transform 0.4s;
            background: #fff;
        }
        
        .page-image:hover {
            transform: scale(1.03);
        }
        
        .page-image img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            filter: sepia(0.2) brightness(1.05);
        }
        
        .page-image-caption {
            background: linear-gradient(to bottom, #8b4513, #a0522d);
            padding: 15px;
            text-align: center;
            color: #ffd700;
            font-size: 1.1rem;
            font-weight: 500;
        }
        
        .page-text {
            font-size: 1.3rem;
            line-height: 1.8;
            margin: 30px 0;
            padding: 30px;
            background: rgba(255, 248, 225, 0.8);
            border-radius: 15px;
            border-left: 8px solid #d2691e;
            color: #5a3921;
            font-weight: 500;
        }
        
        .back-button {
            display: block;
            width: 220px;
            margin: 30px auto;
            padding: 16px;
            background: linear-gradient(to bottom, #8b4513, #a0522d);
            color: #ffd700;
            text-align: center;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            box-shadow: 
                0 8px 20px rgba(139, 69, 19, 0.4),
                0 0 0 3px #ffd700;
            transition: all 0.3s;
            border: 2px solid #ffa500;
            cursor: pointer;
        }
        
        .back-button:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 12px 25px rgba(139, 69, 19, 0.5),
                0 0 0 3px #ffd700,
                0 0 15px rgba(255, 215, 0, 0.4);
            background: linear-gradient(to bottom, #a0522d, #8b4513);
        }
        
        .footer {
            text-align: center;
            padding: 40px;
            margin-top: 60px;
            border-top: 6px solid #8b4513;
            color: #fff;
            font-size: 1.2rem;
            background: linear-gradient(145deg, #a0522d, #8b4513);
            border-radius: 0 0 25px 25px;
            position: relative;
            box-shadow: 0 -10px 30px rgba(139, 69, 19, 0.4);
        }
        
        .footer::before {
            content: '';
            position: absolute;
            top: -6px;
            left: 20px;
            right: 20px;
            height: 12px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
            border-radius: 6px;
        }
        
        .footer p {
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }
        
        .footer p:last-child {
            margin-bottom: 0;
        }
        
        .snow-button {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: linear-gradient(145deg, #8b4513, #a0522d);
            color: #ffd700;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 2rem;
            box-shadow: 
                0 8px 20px rgba(139, 69, 19, 0.4),
                0 0 0 3px #ffd700,
                0 0 0 6px #8b4513;
            z-index: 100;
            transition: all 0.3s;
            border: 2px solid #ffa500;
        }
        
        .snow-button:hover {
            transform: scale(1.1) rotate(15deg);
            background: linear-gradient(145deg, #a0522d, #8b4513);
            box-shadow: 
                0 12px 25px rgba(139, 69, 19, 0.5),
                0 0 0 3px #ffd700,
                0 0 0 6px #8b4513,
                0 0 20px rgba(255, 215, 0, 0.4);
        }
        
        .snow-button.active {
            background: linear-gradient(145deg, #4682b4, #5d9ec9);
            box-shadow: 
                0 8px 20px rgba(70, 130, 180, 0.4),
                0 0 0 3px #87ceeb,
                0 0 0 6px #4682b4;
        }
        
        .page-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #8b4513;
            color: #ffd700;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            border: 2px solid #ffd700;
        }
        
        .floating-candies {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .candy {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.7;
            animation: float 6s infinite ease-in-out;
            filter: drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.2));
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
        
        /* Адаптивность для бокового меню */
        @media (max-width: 1200px) {
            .main-content-wrapper {
                flex-direction: column;
            }
            
            .months-sidebar {
                position: static;
                width: 100%;
                max-height: none;
            }
            
            .months-list {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .month-item {
                flex: 0 0 calc(33.333% - 15px);
            }
        }
        
        @media (max-width: 992px) {
            .header-title {
                font-size: 2.5rem;
            }
            
            .header-subtitle {
                font-size: 1.3rem;
            }
            
            .main-image {
                height: 350px;
            }
        }
        
        @media (max-width: 768px) {
            .header-title {
                font-size: 2.2rem;
            }
            
            .main-title, .page-title {
                font-size: 2rem;
            }
            
            .main-text, .page-content {
                padding: 30px;
            }
            
            .main-image {
                height: 300px;
            }
            
            .main-content, .page-text {
                padding: 20px;
                font-size: 1.1rem;
            }
            
            .month-item {
                flex: 0 0 calc(50% - 15px);
            }
        }
        
        @media (max-width: 576px) {
            .header-title {
                font-size: 1.8rem;
            }
            
            .header-subtitle {
                font-size: 1.1rem;
            }
            
            .main-text, .page-content {
                padding: 20px 15px;
            }
            
            .main-image {
                height: 250px;
            }
            
            .main-content, .page-text {
                padding: 15px;
                font-size: 1rem;
            }
            
            .main-title, .page-title {
                font-size: 1.8rem;
            }
            
            .month-item {
                flex: 0 0 100%;
            }
        }
    </style>
</head>

        function createFloatingCandies() {
            const container = document.getElementById('floatingCandies');
            const candyTypes = ['🍬', '🍭', '🍫', '🍪', '🧁', '🎂', '🍩', '💖', '⭐', '🌟'];
            
            for (let i = 0; i < 20; i++) {
                const candy = document.createElement('div');
                candy.className = 'candy';
                candy.innerHTML = candyTypes[Math.floor(Math.random() * candyTypes.length)];
                
                candy.style.left = Math.random() * 100 + 'vw';
                candy.style.top = Math.random() * 100 + 'vh';
                
                const duration = Math.random() * 4 + 4;
                candy.style.animationDuration = duration + 's';
                
                const size = Math.random() * 20 + 15;
                candy.style.fontSize = size + 'px';
                
                candy.style.animationDelay = Math.random() * 3 + 's';
                
                const colors = ['#FF6B6B', '#4ECDC4', '#FFD166', '#C44569', '#118AB2'];
                candy.style.color = colors[Math.floor(Math.random() * colors.length)];
                
                container.appendChild(candy);
            }
        }
        
        function generateMonthsList() {
            const monthsList = document.getElementById('monthsList');
            
            pageData.forEach((month, index) => {
                const monthItem = document.createElement('div');
                monthItem.className = 'month-item';
                if (index === 0) monthItem.classList.add('active');
                monthItem.dataset.monthId = month.id;
                
                monthItem.innerHTML = `
                    <div class="month-number">${month.id}</div>
                    <div class="month-info">
                        <div class="month-title">${month.title}</div>
                        <div class="month-subtitle">${month.subtitle}</div>
                    </div>
                    <div class="month-icon"><i class="fas fa-candy-cane"></i></div>
                `;
                
                monthItem.addEventListener('click', function() {
                    openMonth(month.id);
                });
                
                monthsList.appendChild(monthItem);
            });
        }
        
        function generatePages() {
            const pagesContainer = document.getElementById('pagesContainer');
            
            pageData.forEach(page => {
                const pageElement = document.createElement('div');
                pageElement.className = 'page-content';
                pageElement.id = `page${page.id}`;
                
                pageElement.innerHTML = `
                    <div class="page-counter">text ${page.id} text 10</div>
                    <h2 class="page-title">${page.pageTitle}</h2>
                    
                    <div class="page-images">
                        <div class="page-image">
                            <img src="${page.images[0].url}" alt="text">
                            <div class="page-image-caption">${page.images[0].caption}</div>
                        </div>
                        
                        <div class="page-image">
                            <img src="${page.images[1].url}" alt="text">
                            <div class="page-image-caption">${page.images[1].caption}</div>
                        </div>
                    </div>
                    
                    <div class="page-text">
                        <p>${page.text}</p>
                    </div>
                    
                    <a class="back-button" onclick="closeMonth()">text</a>
                `;
                
                pagesContainer.appendChild(pageElement);
            });
        }
        
        function openMonth(monthId) {
            // Обновляем активный класс в списке месяцев
            document.querySelectorAll('.month-item').forEach(item => {
                item.classList.remove('active');
            });
            
            const activeMonth = document.querySelector(`.month-item[data-month-id="${monthId}"]`);
            if (activeMonth) {
                activeMonth.classList.add('active');
            }
            
            // Скрываем основное содержание
            document.getElementById('mainText').style.display = 'none';
            document.querySelector('.main-image').style.display = 'none';
            
            // Показываем нужную страницу
            document.querySelectorAll('.page-content').forEach(page => {
                page.classList.remove('active');
            });
            
            const targetPage = document.getElementById(`page${monthId}`);
            if (targetPage) {
                targetPage.classList.add('active');
                targetPage.scrollIntoView({ 
                    behavior: 'smooth',
                    block: 'start'
                });
            }
        }
        
        window.closeMonth = function() {
            // Показываем основное содержание
            document.getElementById('mainText').style.display = 'block';
            document.querySelector('.main-image').style.display = 'block';
            
            // Скрываем все страницы
            document.querySelectorAll('.page-content').forEach(page => {
                page.classList.remove('active');
            });
            
            // Убираем активный класс у всех месяцев
            document.querySelectorAll('.month-item').forEach(item => {
                item.classList.remove('active');
            });
        };
        
        function setupSnowfall() {
            const snowButton = document.getElementById('snowButton');
            let isSnowing = false;
            let snowInterval;
            let snowContainer;
            
            snowButton.addEventListener('click', function() {
                isSnowing = !isSnowing;
                
                if (isSnowing) {
                    this.classList.add('active');
                    this.innerHTML = '<i class="fas fa-stop"></i>';
                    startSnowfall();
                } else {
                    this.classList.remove('active');
                    this.innerHTML = '<i class="fas fa-snowflake"></i>';
                    stopSnowfall();
                }
            });
            
            function startSnowfall() {
                snowContainer = document.createElement('div');
                snowContainer.id = 'snowContainer';
                snowContainer.style.position = 'fixed';
                snowContainer.style.top = '0';
                snowContainer.style.left = '0';
                snowContainer.style.width = '100%';
                snowContainer.style.height = '100%';
                snowContainer.style.pointerEvents = 'none';
                snowContainer.style.zIndex = '999';
                document.body.appendChild(snowContainer);
                
                snowInterval = setInterval(() => {
                    for (let i = 0; i < 3; i++) {
                        createSnowflake();
                    }
                }, 100);
            }
            
            function createSnowflake() {
                const snowflake = document.createElement('div');
                snowflake.innerHTML = '❄';
                snowflake.style.position = 'absolute';
                snowflake.style.left = Math.random() * 100 + 'vw';
                snowflake.style.top = '-20px';
                snowflake.style.fontSize = (Math.random() * 15 + 10) + 'px';
                snowflake.style.opacity = Math.random() * 0.5 + 0.3;
                snowflake.style.color = 'white';
                snowflake.style.textShadow = '0 0 5px rgba(255,255,255,0.5)';
                snowflake.style.filter = 'drop-shadow(1px 1px 1px rgba(0,0,0,0.1))';
                snowContainer.appendChild(snowflake);
                
                let posY = -20;
                const fallSpeed = Math.random() * 2 + 1;
                const sway = Math.random() * 4 - 2;
                let posX = parseFloat(snowflake.style.left);
                
                const fallInterval = setInterval(() => {
                    posY += fallSpeed;
                    posX += sway * 0.1;
                    snowflake.style.top = posY + 'px';
                    snowflake.style.left = posX + 'vw';
                    
                    if (posY > window.innerHeight) {
                        clearInterval(fallInterval);
                        snowflake.remove();
                    }
                }, 20);
                
                setTimeout(() => {
                    snowflake.remove();
                    clearInterval(fallInterval);
                }, 10000);
            }
            
            function stopSnowfall() {
                clearInterval(snowInterval);
                if (snowContainer) {
                    snowContainer.remove();
                }
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            createFloatingCandies();
            generateMonthsList();
            generatePages();
            setupSnowfall();
        });
    </script>
